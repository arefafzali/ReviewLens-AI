services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      REVIEWLENS_ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REVIEWLENS_LLM_PROVIDER: ${REVIEWLENS_LLM_PROVIDER:-openai}
      REVIEWLENS_OPENAI_MODEL: ${REVIEWLENS_OPENAI_MODEL:-gpt-4o-mini}
      REVIEWLENS_CORS_ALLOW_ORIGINS: ${REVIEWLENS_CORS_ALLOW_ORIGINS}
      REVIEWLENS_WORKSPACE_COOKIE_SECURE: ${REVIEWLENS_WORKSPACE_COOKIE_SECURE:-true}
      REVIEWLENS_WORKSPACE_COOKIE_HTTP_ONLY: ${REVIEWLENS_WORKSPACE_COOKIE_HTTP_ONLY:-true}
      REVIEWLENS_WORKSPACE_COOKIE_SAME_SITE: ${REVIEWLENS_WORKSPACE_COOKIE_SAME_SITE:-none}
      REVIEWLENS_WORKSPACE_COOKIE_PATH: ${REVIEWLENS_WORKSPACE_COOKIE_PATH:-/}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
