services:
  db:
    image: postgres:16-alpine
    container_name: reviewlens-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewlens}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reviewlens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: reviewlens-backend
    environment:
      REVIEWLENS_ENVIRONMENT: ${REVIEWLENS_ENVIRONMENT:-local}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-reviewlens}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REVIEWLENS_OPENAI_MODEL: ${REVIEWLENS_OPENAI_MODEL:-gpt-4o-mini}
      REVIEWLENS_FIRECRAWL_TIMEOUT_SECONDS: ${REVIEWLENS_FIRECRAWL_TIMEOUT_SECONDS:-45}
      REVIEWLENS_OPENAI_TIMEOUT_SECONDS: ${REVIEWLENS_OPENAI_TIMEOUT_SECONDS:-45}
      REVIEWLENS_MARKDOWN_CHUNK_SIZE_CHARS: ${REVIEWLENS_MARKDOWN_CHUNK_SIZE_CHARS:-6000}
      REVIEWLENS_MARKDOWN_CHUNK_OVERLAP_CHARS: ${REVIEWLENS_MARKDOWN_CHUNK_OVERLAP_CHARS:-800}
      REVIEWLENS_MARKDOWN_MAX_CHUNKS: ${REVIEWLENS_MARKDOWN_MAX_CHUNKS:-30}
      REVIEWLENS_WORKSPACE_COOKIE_NAME: ${REVIEWLENS_WORKSPACE_COOKIE_NAME:-reviewlens_workspace_id}
      REVIEWLENS_WORKSPACE_COOKIE_MAX_AGE_SECONDS: ${REVIEWLENS_WORKSPACE_COOKIE_MAX_AGE_SECONDS:-2592000}
      REVIEWLENS_WORKSPACE_COOKIE_SECURE: ${REVIEWLENS_WORKSPACE_COOKIE_SECURE:-false}
      REVIEWLENS_WORKSPACE_COOKIE_HTTP_ONLY: ${REVIEWLENS_WORKSPACE_COOKIE_HTTP_ONLY:-true}
      REVIEWLENS_WORKSPACE_COOKIE_SAME_SITE: ${REVIEWLENS_WORKSPACE_COOKIE_SAME_SITE:-lax}
      REVIEWLENS_WORKSPACE_COOKIE_PATH: ${REVIEWLENS_WORKSPACE_COOKIE_PATH:-/}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_PREFIX: ""
      LOG_LEVEL: INFO
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    container_name: reviewlens-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: >-
      sh -c "rm -rf /app/.next && npm ci && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  pgdata:
